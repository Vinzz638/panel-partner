<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>
body{background:#000 url('https://i.pinimg.com/736x/f2/61/8b/f2618b760086307a68e833441584b423.jpg') no-repeat center;background-size:cover;margin:0;height:100vh;display:flex;justify-content:center;align-items:center;font-family:sans-serif;overflow:hidden}
.card{border:2px solid #4ade80;background:rgba(13,13,13,0.95);padding:30px;border-radius:20px;width:320px;text-align:center;box-shadow:0 0 25px rgba(74,222,128,0.6);backdrop-filter:blur(10px)}
.title{color:#4ade80;font-weight:700;font-size:20px;letter-spacing:3px;margin-bottom:25px;text-shadow:0 0 10px #4ade80}
input{width:100%;background:#111;border:1px solid #4ade80;color:#4ade80;padding:15px;margin-bottom:20px;border-radius:12px;outline:0;box-sizing:border-box;text-align:center;font-weight:700}
button{width:100%;background:#4ade80;color:#000;font-weight:700;padding:15px;border:none;border-radius:12px;cursor:pointer;text-transform:uppercase;box-shadow:0 0 15px #4ade80}
</style></head><body>
<div id="app" class="card"><div class="title">VINZZXHOST LOGIN</div><input type="text" id="s" placeholder="MASUKKAN SANDI"><button onclick="login()">MASUK PANEL</button></div>
<script>
const api = "https://script.google.com/macros/s/AKfycbyb3Y3kal1zMl-5SxDqrNDWziDv6yBDqmDNVKwqCBXPHHmFHk06sezyjXoPnBGyHxJcEA/exec";
const panelUrl = "https://t.me/vinzz_bot"; 

function login() {
    const k = document.getElementById("s").value;
    if(!k) return alert("Isi Sandi!");
    
    // Panggil API lewat jalur belakang biar gak error
    const script = document.createElement('script');
    script.src = `${api}?action=checkKey&key=${k}&callback=handleRes`;
    document.body.appendChild(script);
}

function handleRes(d) {
    if(d.status == "success"){
        localStorage.setItem("vTime", Date.now());
        window.location.replace(panelUrl); 
    } else {
        alert(d.status == "expired" ? "SANDI EXPIRED! ❌" : "SANDI SALAH! ❌");
    }
}

window.onload = function() {
    const t = localStorage.getItem("vTime");
    if(t) {
        const diff = (Date.now() - t) / 1000 / 60;
        if(diff < 10) window.location.replace(panelUrl);
        else localStorage.clear();
    }
}
</script></body></html>
