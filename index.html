<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{background:#000;margin:0;height:100vh;display:flex;justify-content:center;align-items:center;font-family:sans-serif}.card{border:2px solid #4ade80;background:#0d0d0d;padding:30px;border-radius:20px;width:320px;text-align:center;box-shadow:0 0 25px rgba(74,222,128,0.4)}.title{color:#4ade80;font-weight:700;font-size:20px;letter-spacing:3px;margin-bottom:25px;text-shadow:0 0 10px #4ade80}input{width:100%;background:#111;border:1px solid #4ade80;color:#4ade80;padding:15px;margin-bottom:20px;border-radius:12px;outline:0;box-sizing:border-box;text-align:center;font-weight:700}button{width:100%;background:#4ade80;color:#000;font-weight:700;padding:15px;border:none;border-radius:12px;cursor:pointer;text-transform:uppercase;box-shadow:0 0 15px #4ade80;transition:0.3s}button:active{transform:scale(0.95)}</style></head><body><div class="card"><div class="title">VINZZXHOST LOGIN</div><input type="text" id="s" placeholder="MASUKKAN SANDI"><button onclick="login()">MASUK PANEL</button></div><script>async function login(){const k=document.getElementById("s").value;if(!k)return alert("Isi Sandi!");try{const r=await fetch("https://script.google.com/macros/s/AKfycbz20JytMmeYtFCsaDAmDK2Uzh7ZBUPnIdVUOn4Q2HUaro-IKT961oeNT6PXaVWg5yBxRQ/exec?action=checkKey&key="+k);const d=await r.json();if(d.status=="success"){alert("Akses Diterima! ✅"); window.location.href="LINK_PANEL_UTAMA_ABANG_DISINI";}else{alert("SANDI SALAH / EXPIRED! ❌");}}catch(e){alert("Sandi Valid! ✅ Masuk...");}}</script></body></html>
